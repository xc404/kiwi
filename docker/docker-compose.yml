services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KIWI_INIT_ADMIN_PASSWORD: kiwi-demo
      APP_PASSWORD_SECRET: docker-demo-change-me-in-production
      CAMUNDA_ADMIN_PASSWORD: demo
    volumes:
      - backend_data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_data:
