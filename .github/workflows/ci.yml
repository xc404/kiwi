name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Maven compile
        run: mvn -pl kiwi-admin/backend -am compile -DskipTests

  bpmn-test:
    name: BPM modules test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Maven test (BPM modules)
        run: >-
          mvn -pl
          kiwi-bpmn/kiwi-bpmn-core,kiwi-bpmn/kiwi-bpmn-component,kiwi-bpmn/kiwi-bpmn-external-task,kiwi-bpmn/kiwi-bpmn-component-slurm
          -am test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kiwi-admin/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: kiwi-admin/frontend/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint:ci:next
      - name: ng build
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
