# Kiwi CI：后端测试 + 前端 lint（lint 暂不因失败阻断合并，后续收紧时去掉 continue-on-error）
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Maven test (kiwi-admin backend + deps)
        run: mvn -B -pl kiwi-admin/backend -am test

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kiwi-admin/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: kiwi-admin/frontend/package-lock.json
      - run: npm ci
      - name: ESLint
        continue-on-error: true
        run: npm run lint
