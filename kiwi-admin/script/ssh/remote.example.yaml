# 单主机连接配置。复制为 remote.local.yaml 或 remote.yaml 后填写，勿提交含密码的副本。
#
# 用法：
#   python ../remote_run.py deploy --config ../ssh/remote.local.yaml

# 展示名（日志与提示，可选）
host: kiwi-test

# 必填：远端地址与账号
hostname: 192.0.2.10
user: deploy
port: 22

# 认证：key | password
#   key        — 使用公钥，可配 identity_file
#   password   — 使用密码；优先 sshpass + 系统 ssh，若无 sshpass 则用 Python paramiko（pip install -r ../requirements-remote.txt）
#                密码来源（优先级）：YAML 字段 password > 环境变量（见 password_env）> KIWI_SSH_PASSWORD
auth: key
identity_file: ~/.ssh/id_ed25519

# --- 密码示例（二选一配置方式，勿与密钥同时用于生产）---
# auth: password
# password_env: KIWI_SSH_PASSWORD
# 运行前： export KIWI_SSH_PASSWORD='your-secret'
#
# 或（不推荐，易误提交）：
# auth: password
# password: "your-secret"

# SSH 行为（可选）
strict_host_key_checking: accept-new
