# Kiwi 远程上传配置（ssh）
# 复制为 remote.local.yaml 后按需修改，勿提交含密码的副本。
#
# 用法：
#   python ../deploy.py --config ../conf/remote.local.yaml

ssh:
  # 展示名（日志与提示，可选）
  host: kiwi-test
  hostname: 192.0.2.10
  user: deploy
  port: 22

  # 认证：key | password
  #   key — 公钥，可配 identity_file
  #   password — 优先 sshpass + 系统 ssh；否则 paramiko（见 ../requirements-remote.txt）
  auth: key
  identity_file: ~/.ssh/id_ed25519

  # --- 密码示例 ---
  # auth: password
  # password_env: KIWI_SSH_PASSWORD
  # password: "your-secret"

  strict_host_key_checking: accept-new
