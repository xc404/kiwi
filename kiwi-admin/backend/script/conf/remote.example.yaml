# Kiwi 远程上传配置（ssh + deploy）
# 复制为 remote.local.yaml 后按需修改，勿提交含密码的副本。
#
# 用法（在 script/ 目录）：
#   python deploy.py

ssh:
  # 展示名（日志与提示，可选）
  host: kiwi-test
  hostname: 192.0.2.10
  user: deploy
  port: 22

  # 认证：key | password
  #   key — 公钥，可配 identity_file
  #   password — 优先 sshpass + 系统 ssh；否则 paramiko（见 ../requirements-remote.txt）
  auth: key
  identity_file: ~/.ssh/id_ed25519

  # --- 密码示例 ---
  # auth: password
  # password_env: KIWI_SSH_PASSWORD
  # password: "your-secret"

  strict_host_key_checking: accept-new

deploy:
  # 本地产物（相对路径以 backend/ 为根）
  app_jar: target/kiwi-admin-1.0.0.jar
  lib_jar: target/kiwi-admin-1.0.0-lib.jar

  remote_dir: /opt/kiwi-admin
  remote_app_name: kiwi-admin.jar
  remote_lib_name: kiwi-admin-lib.jar

  # 可选：Maven 可执行文件（默认从 PATH / MAVEN_HOME / MVN 解析）
  # mvn: C:\apache-maven\bin\mvn.cmd

  skip_build: false
  # true：通常只上传应用 jar；false：上传应用 jar + lib jar
  # 远端尚无 lib jar 或 POM 依赖变更时也会自动上传 lib jar
  incremental: true
