spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/dev-bpm;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  # MONGODB (MongoProperties)
  data:
    mongodb:
      uri: mongodb://10.15.56.173:27017/x404?authSource=admin
      database: x404
      auto-index-creation: true
    redis:
      # Redis数据库索引（默认为0）
      database: 1
      # Redis服务器地址
      host: 10.19.227.46
      # Redis服务器连接端口
      port: 6379


kiwi:
  bpm:
    default-async-before-enabled: true
    slurm:
      workDirectory: /home/cryoems/chaox/kiwi/slurm
  external-task:
    lock-duration: 10000
    workerId: kiwi-admin
APP_PASSWORD_SECRET: REDACTED

OPENAI_API_KEY: REDACTED

DASHSCOPE_API_KEY: REDACTED
