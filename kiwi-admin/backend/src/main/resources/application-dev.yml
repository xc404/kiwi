spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/dev-bpm;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    type: com.zaxxer.hikari.HikariDataSource
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    mongodb:
      uri: mongodb://127.0.0.1:27017/kiwi?authSource=admin&retryWrites=false
  # MONGODB (MongoProperties)
