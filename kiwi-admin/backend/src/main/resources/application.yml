server:
  port: 8088
  servlet:
    encoding:
      charset: UTF-8
      enabled: true

# CORS：逗号分隔；对全站及 Camunda /engine-rest 生效；生产环境务必配置为实际前端 Origin，勿使用 *
# AI 对话：Spring AI Alibaba DashScope（通义）；密钥见 KIWI_AI_API_KEY 或 DASHSCOPE_API_KEY
kiwi:
  ai:
    enabled: ${KIWI_AI_ENABLED:true}
    # 助手 ChatClient 回环 MCP 的 HTTP 基址；SSE 路径与 spring.ai.mcp.server.sse-endpoint 保持一致
    mcp:
      loopback-base-url: ${KIWI_AI_MCP_LOOPBACK_BASE_URL:http://127.0.0.1:${server.port:8088}}
      # WebServer 已开始监听后再触发 MCP 回环 warmup，避免启动早期 ConnectException / SSE connection error
      warmup-enabled: ${KIWI_AI_MCP_WARMUP_ENABLED:true}
      warmup-max-attempts: ${KIWI_AI_MCP_WARMUP_MAX_ATTEMPTS:20}
      warmup-backoff-ms: ${KIWI_AI_MCP_WARMUP_BACKOFF_MS:150}
  # 用户在「个人设置」签发的长期访问令牌（PAT）；机机场景可 Authorization: Bearer 使用该令牌
  personal-access-token:
    max-per-user: ${KIWI_PERSONAL_ACCESS_TOKEN_MAX:30}
    # Sa 会话有效期（秒）；仍兼容旧环境变量 KIWI_INTEGRATION_API_TOKEN_TIMEOUT
    session-timeout-seconds: ${KIWI_PERSONAL_ACCESS_TOKEN_SESSION_TIMEOUT_SECONDS:${KIWI_INTEGRATION_API_TOKEN_TIMEOUT:31536000}}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4201,http://localhost:8088}
  password:
    secret: ${APP_PASSWORD_SECRET:change-me-generate-a-long-random-secret}
  gen:
    author: kiwi
    packageName: com.kiwi.project
    autoRemovePre: false
    tablePrefix: sys_
    allowOverwrite: false

spring:
  ai:
    dashscope:
      api-key: ${KIWI_AI_API_KEY:${DASHSCOPE_API_KEY:}}
      chat:
        options:
          model: ${KIWI_AI_MODEL:qwen-plus}
    # MCP Server（WebMVC + SSE）：端点见 spring.ai.mcp.server.*
    mcp:
      server:
        enabled: ${SPRING_AI_MCP_SERVER_ENABLED:true}
        name: ${SPRING_AI_MCP_SERVER_NAME:kiwi-admin}
        version: ${SPRING_AI_MCP_SERVER_VERSION:1.0.0}
        instructions: "Kiwi 管理后台 MCP：字典与页面导航等工具。HTTP 调用请携带与 API 相同的登录 Token（Authorization: Bearer ...）。"
        # SSE：事件流路径 + JSON-RPC POST 路径（与 Spring AI WebMvc SSE 约定一致；若与运行版本不符请用环境变量覆盖）
        sse-endpoint: ${SPRING_AI_MCP_SERVER_SSE_ENDPOINT:/sse}
        sse-message-endpoint: ${SPRING_AI_MCP_SERVER_SSE_MESSAGE_ENDPOINT:/message}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/bpm?&nullCatalogMeansCurrent=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me}
    type: com.mysql.cj.jdbc.MysqlDataSource
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://127.0.0.1:27017/x404?authSource=admin}
      database: ${SPRING_DATA_MONGODB_DATABASE:x404}
      auto-index-creation: true
    redis:
      database: ${SPRING_DATA_REDIS_DATABASE:1}
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

camunda.bpm:
  admin-user:
    id: ${CAMUNDA_ADMIN_USER:demo}
    password: ${CAMUNDA_ADMIN_PASSWORD:change-me}
    firstName: Demo
  filter:
    create: All tasks
  generic-properties:
    properties:
      skip-isolation-level-check: true
      historyTimeToLive: P15D
      # 未捕获的 BpmnError 时抛 ProcessEngineException，而非按「none end」静默结束（ACT_HI_PROCINST 易为 COMPLETED）
      # 关闭：环境变量 CAMUNDA_ENABLE_EXCEPTIONS_AFTER_UNHANDLED_BPMN_ERROR=false
      enableExceptionsAfterUnhandledBpmnError: ${CAMUNDA_ENABLE_EXCEPTIONS_AFTER_UNHANDLED_BPMN_ERROR:true}
      # 异步 Job（async 延续、定时器等）失败时的全局重试策略（ISO 8601）；BPMN 上 camunda:failedJobRetryTimeCycle 可覆盖本项
      failedJobRetryTimeCycle: ${CAMUNDA_FAILED_JOB_RETRY_TIME_CYCLE:R5/PT1M}

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  token-style: tik

# 默认使用 Slf4j；在 dev/local profile 下可切换为 StdOut（见 application-dev.yml）
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

