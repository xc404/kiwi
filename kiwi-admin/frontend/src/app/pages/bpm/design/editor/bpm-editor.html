<div class="bpm-editor-page">
  <bpm-editor-process-meta [loading]="processLoading()" [meta]="processMeta()" />

  <nz-layout class="full-height bpm-editor-layout">
    <nz-sider class="mix-sider-height side-explorer bpm-editor-palette-sider" nzNoAnimation nzTheme="light" nzWidth="300px">
      <div class="bpm-editor-palette-scroll">
        <bpm-pallete></bpm-pallete>
      </div>
    </nz-sider>
    <nz-content class="flex flex-column bpm-editor-main-content">
      <nz-layout class="bpm-editor-workspace">
        <nz-content class="flex flex-column bpm-editor-canvas-content">
          <div class="top-bar">
            <bpm-toolbar [bpmnModeler]="bpmnModeler"></bpm-toolbar>
          </div>
          <div class="canvas bpm-editor-canvas" ref="canvas"></div>
        </nz-content>
        <nz-sider class="mix-sider-height side-explorer bpm-editor-properties-sider" nzNoAnimation nzTheme="light" nzWidth="500px">
          <div class="bpm-editor-properties-scroll">
            <bpm-properties-panel [bpmnModeler]="bpmnModeler" [currentProcessId]="bpmnId()" [projectId]="bpmProcess()?.projectId ?? null" [usedHeight]="50"></bpm-properties-panel>
          </div>
        </nz-sider>
      </nz-layout>
    </nz-content>
  </nz-layout>

  <bpm-ai-chat [getToolbarContext]="getToolbarContextFn" />
</div>
