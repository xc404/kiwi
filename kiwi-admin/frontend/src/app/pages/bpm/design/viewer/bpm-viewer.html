<app-page-header></app-page-header>
<section class="page-content bpm-viewer-page">
  <div class="instance-toolbar">
    @if (view(); as v) {
      <span class="instance-id" title="流程实例 ID">{{ v.processInstanceId }}</span>
      @if (v.processDefinitionKey) {
        <span class="def-key">定义：{{ v.processDefinitionKey }}</span>
      }
      @if (v.businessKey) {
        <span class="biz-key">业务键：{{ v.businessKey }}</span>
      }
      <nz-tag [nzColor]="statusColor()">{{ statusLabel() }}</nz-tag>
      @if (v.activeActivityIds.length) {
        <span class="hint">当前节点：{{ v.activeActivityIds.join(', ') }}</span>
      }
    }
  </div>
  <nz-layout class="full-height bpm-viewer-layout">
    <nz-content class="flex flex-column bpm-viewer-main-content">
      <nz-layout class="bpm-viewer-workspace">
        <nz-content class="flex flex-column bpm-viewer-canvas-content">
          <nz-spin [nzSpinning]="loading()" class="bpm-viewer-canvas-spin">
            <div #canvasHost class="instance-canvas bpm-editor-canvas"></div>
          </nz-spin>
        </nz-content>
        @if (view()) {
          <nz-sider
            class="mix-sider-height side-explorer bpm-viewer-properties-sider"
            nzWidth="500px"
            nzTheme="light"
            nzNoAnimation
          >
            <div class="bpm-viewer-properties-scroll">
              @if (viewer) {
                <bpm-properties-panel
                  [bpmnModeler]="viewer"
                  [instanceMode]="true"
                />
              }
            </div>
          </nz-sider>
        }
      </nz-layout>
    </nz-content>
  </nz-layout>
</section>
