<section class="page-content bpm-viewer-page">
  <bpm-viewer-header [loading]="!!processInstanceId() && !processInstance()" [processInstance]="processInstance()" [recovering]="recovering()" (recoverRequested)="onRecoverRequested()" />
  <nz-layout class="full-height bpm-viewer-layout">
    <nz-content class="flex flex-column bpm-viewer-main-content">
      <nz-layout class="bpm-viewer-workspace">
        <nz-content class="flex flex-column bpm-viewer-canvas-content">
          <div #canvasHost class="instance-canvas bpm-editor-canvas"></div>
        </nz-content>
      </nz-layout>
    </nz-content>
    <nz-sider class="bpm-viewer-properties-sider" nzTheme="light" nzWidth="450px">
      <div class="bpm-viewer-properties-scroll">
        @if (viewer) {
          <bpm-properties-panel [bpmnModeler]="viewer" [processInstance]="processInstance()" [usedHeight]="200" [viewMode]="true"></bpm-properties-panel>
        }
      </div>
    </nz-sider>
  </nz-layout>
</section>
