<section class="page-content bpm-viewer-page">
  <bpm-viewer-header [processInstance]="processInstance()" [loading]="!!processInstanceId() && !processInstance()" />
  <nz-layout class="full-height bpm-viewer-layout">
    <nz-content class="flex flex-column bpm-viewer-main-content">
      <nz-layout class="bpm-viewer-workspace">
        <nz-content class="flex flex-column bpm-viewer-canvas-content">
          <div #canvasHost class="instance-canvas bpm-editor-canvas"></div>
        </nz-content>
      </nz-layout>
    </nz-content>
    <nz-sider nzWidth="450px" nzTheme="light" class="bpm-viewer-properties-sider">
      <div class="bpm-viewer-properties-scroll">
        @if (viewer) {
        <bpm-properties-panel [bpmnModeler]="viewer" [viewMode]="true" [usedHeight]="145"
          [processInstance]="processInstance()"></bpm-properties-panel>
        }
      </div>
    </nz-sider>
  </nz-layout>
</section>
