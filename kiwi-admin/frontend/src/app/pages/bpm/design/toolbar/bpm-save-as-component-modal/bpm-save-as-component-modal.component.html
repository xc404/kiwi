<div class="bpm-save-as-component-dialog">
  <p class="bpm-save-as-component-dialog__hint"> 与接口 SaveAsComponentInput 一致：服务端根据已保存流程 BPMN 推导输入/输出并入库。 </p>
  <div class="bpm-save-as-component-dialog__field">
    <div class="bpm-save-as-component-dialog__label">name（必填）</div>
    <input name="saveAsComponentName" nz-input placeholder="组件名称" [(ngModel)]="name" />
  </div>
  <div class="bpm-save-as-component-dialog__field">
    <div class="bpm-save-as-component-dialog__label">description</div>
    <input name="saveAsComponentDescription" nz-input placeholder="描述" [(ngModel)]="description" />
  </div>
  <div class="bpm-save-as-component-dialog__field">
    <div class="bpm-save-as-component-dialog__label">version</div>
    <input name="saveAsComponentVersion" nz-input placeholder="例如 1.0" [(ngModel)]="version" />
  </div>
</div>
