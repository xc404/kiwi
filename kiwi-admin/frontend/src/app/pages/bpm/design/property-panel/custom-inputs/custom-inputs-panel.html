@if (readonlyFlag()) {
  @if (customRows().every((r) => !r.name.trim())) {
    <span class="muted">—</span>
  } @else {
    <ul class="readonly-list">
      @for (r of customRows(); track $index) {
        @if (r.name.trim()) {
          <li>
            <bpm-readonly-property-row [propertyDescription]="toPropertyDescription(r)" [variables]="variablesProp()" />
          </li>
        }
      }
    </ul>
  }
} @else {
  @for (row of customRows(); track $index; let i = $index) {
    <bpm-custom-output-row [row]="row" [variables]="variablesProp()" (remove)="removeRow(i)" (rowChange)="onRowChange(i, $event)" />
  }
  <div class="toolbar">
    <button type="button" nz-button nzSize="small" nzType="dashed" (click)="addRow()">
      <nz-icon nzTheme="outline" nzType="plus" />
      添加输入
    </button>
  </div>
}
