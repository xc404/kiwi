<div class="properties-panel">
    <bpm-panel-header [element]="element()"></bpm-panel-header>
    @if(element()){
    <div class="properties-panel-tabs">
        <nz-tabs>
            @for (tab of tabs(); track $index) {
            <nz-tab [nzTitle]="tab.name!">
                <div class="properties-panel-collapse-scroll">
                    <nz-collapse>
                        @for (group of tab.groups; track $index) {
                        <nz-collapse-panel [nzHeader]="group.name" [nzActive]="group.important ? true : false"
                            nzShowArrow="true">
                            <div style="width: 100%;">
                                <property-group [element]="element()" [bpmnModeler]="bpmnModeler()"
                                    [properties]="group.properties" [viewMode]="viewMode()"
                                    [variables]="activityVariables()"></property-group>
                            </div>
                        </nz-collapse-panel>

                        }

                        @if (isOutputTab(tab) && showCustomOutputs()) {
                        <nz-collapse-panel nzHeader="自定义输出" [nzActive]="true" nzShowArrow="true">
                            <div style="width: 100%;">
                                <bpm-custom-outputs-panel [element]="element()" [bpmnModeler]="bpmnModeler()"
                                    [viewMode]="viewMode()" [variables]="activityVariables()"
                                    [catalogOutputKeys]="catalogOutputKeys()"></bpm-custom-outputs-panel>
                            </div>
                        </nz-collapse-panel>
                        }

                    </nz-collapse>
                </div>
            </nz-tab>
            }

        </nz-tabs>
    </div>

    }
</div>
<!-- }  -->
