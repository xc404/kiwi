<div class="properties-panel">
  <bpm-panel-header [element]="element()"></bpm-panel-header>
  @if (element()) {
    <div class="properties-panel-tabs">
      <nz-tabs>
        @for (tab of tabs(); track $index) {
          <nz-tab [nzTitle]="tab.name!">
            <div class="properties-panel-collapse-scroll" [style.max-height]="collapseScrollMaxHeight()">
              <nz-collapse>
                @for (group of tab.groups; track $index) {
                  <nz-collapse-panel nzShowArrow="true" [nzActive]="true" [nzHeader]="group.name">
                    <div style="width: 100%">
                      @if (viewMode() || isOutputTab(tab)) {
                        <property-group-readonly
                          [bpmnModeler]="bpmnModeler()"
                          [element]="element()"
                          [properties]="group.properties"
                          [runtimeWarningEnabled]="viewMode() && (isInputTab(tab) || isOutputTab(tab))"
                          [variables]="activityVariables()"
                        ></property-group-readonly>
                      } @else {
                        <property-group-edit
                          [bpmnModeler]="bpmnModeler()"
                          [currentProcessId]="currentProcessId()"
                          [element]="element()"
                          [projectId]="projectId()"
                          [properties]="group.properties"
                          [variables]="activityVariables()"
                        ></property-group-edit>
                      }
                    </div>
                  </nz-collapse-panel>
                }

                @if (isInputTab(tab) && showCustomInputs()) {
                  <nz-collapse-panel nzHeader="自定义输入" nzShowArrow="true" [nzActive]="true">
                    <div style="width: 100%">
                      <bpm-custom-inputs-panel [bpmnModeler]="bpmnModeler()" [element]="element()" [variables]="activityVariables()" [viewMode]="viewMode()"></bpm-custom-inputs-panel>
                    </div>
                  </nz-collapse-panel>
                }

                @if (isOutputTab(tab) && showCustomOutputs()) {
                  <nz-collapse-panel nzHeader="自定义输出" nzShowArrow="true" [nzActive]="true">
                    <div style="width: 100%">
                      <bpm-custom-outputs-panel [bpmnModeler]="bpmnModeler()" [element]="element()" [variables]="activityVariables()" [viewMode]="viewMode()"></bpm-custom-outputs-panel>
                    </div>
                  </nz-collapse-panel>
                }
              </nz-collapse>
            </div>
          </nz-tab>
        }

        @if (isProcessInstanceContext()) {
          <nz-tab nzTitle="流程变量">
            <div class="properties-panel-collapse-scroll" [style.max-height]="collapseScrollMaxHeight()">
              <nz-collapse>
                <nz-collapse-panel nzHeader="流程变量" nzShowArrow="true" [nzActive]="true">
                  <bpm-process-instance-variables-list [processInstanceVariables]="processInstanceVariables()" />
                </nz-collapse-panel>
              </nz-collapse>
            </div>
          </nz-tab>
        }
      </nz-tabs>
    </div>
  }
</div>

<!-- }  -->
