<div class="properties-panel">
    <bpm-panel-header [element]="element()"></bpm-panel-header>
    @if(element()){
    <div class="properties-panel-tabs">
        <nz-tabs>
            @for (tab of tabs(); track $index) {
            <nz-tab [nzTitle]="tab.name!">
                <div class="properties-panel-collapse-scroll" [style.max-height]="collapseScrollMaxHeight()">
                    <nz-collapse>
                        @for (group of tab.groups; track $index) {
                        <nz-collapse-panel [nzHeader]="group.name" [nzActive]="true"
                            nzShowArrow="true">
                            <div style="width: 100%;">
                                @if (viewMode() || isOutputTab(tab)) {
                                <property-group-readonly [element]="element()" [bpmnModeler]="bpmnModeler()"
                                    [properties]="group.properties"
                                    [variables]="activityVariables()"></property-group-readonly>
                                } @else {
                                <property-group-edit [element]="element()" [bpmnModeler]="bpmnModeler()"
                                    [properties]="group.properties"
                                    [variables]="activityVariables()"></property-group-edit>
                                }
                            </div>
                        </nz-collapse-panel>

                        }

                        @if (isOutputTab(tab) && showCustomOutputs()) {
                        <nz-collapse-panel nzHeader="自定义输出" [nzActive]="true" nzShowArrow="true">
                            <div style="width: 100%;">
                                <bpm-custom-outputs-panel [element]="element()" [bpmnModeler]="bpmnModeler()"
                                    [viewMode]="viewMode()" [variables]="activityVariables()"
                                  ></bpm-custom-outputs-panel>
                            </div>
                        </nz-collapse-panel>
                        }

                    </nz-collapse>
                </div>
            </nz-tab>
            }

            @if (isProcessInstanceContext()) {
            <nz-tab nzTitle="流程变量">
                <div class="properties-panel-collapse-scroll" [style.max-height]="collapseScrollMaxHeight()">
                    <nz-collapse>
                        <nz-collapse-panel nzHeader="流程变量" [nzActive]="true" nzShowArrow="true">
                            <bpm-process-instance-variables-list
                                [processInstanceVariables]="processInstanceVariables()" />
                        </nz-collapse-panel>
                    </nz-collapse>
                </div>
            </nz-tab>
            }

        </nz-tabs>
    </div>

    }
</div>

<!-- }  -->
