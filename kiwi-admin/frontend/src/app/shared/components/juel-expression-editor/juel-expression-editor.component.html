<div class="juel-expression-editor">
  @if (!readonly()) {
  <nz-input-wrapper class="juel-expression-editor__inline">
    <input nz-input type="text" [ngModel]="inlineText()" (ngModelChange)="onInlineChange($event)" autocomplete="off"
      spellcheck="false" />
    <nz-icon nzType="code" nzInputAddonAfter nzTheme="outline" (click)="openModal()" />
  </nz-input-wrapper>

  <nz-modal [nzVisible]="modalVisible()" nzTitle="编辑 JUEL 表达式" [nzWidth]="720" nzOkText="确定" nzCancelText="取消"
    [nzMaskClosable]="false" (nzOnCancel)="modalVisible.set(false)" (nzVisibleChange)="onModalVisibleChange($event)"
    (nzAfterOpen)="onModalAfterOpen()" (nzOnOk)="onModalOk()">
    <ng-container *nzModalContent>
      <div class="juel-expression-editor__modal-body">
        <div class="juel-expression-editor__toolbar">
          <button nz-button nzType="dashed" nzSize="small" type="button" nz-dropdown [nzDropdownMenu]="varMenu">
            <nz-icon nzType="apartment" nzTheme="outline" />
            插入变量
          </button>
          <nz-dropdown-menu #varMenu="nzDropdownMenu">
            <ul nz-menu>
              @for (v of variables(); track v.key) {
              <li nz-menu-item (click)="insertVariableRef(v)">
                <code>{{ v.key }}</code>
                <span class="juel-expression-editor__hint">{{ v.source === 'upstream' ? '上游' : '引用' }}</span>
              </li>
              }
              @if (variables().length === 0) {
              <li nz-menu-item nzDisabled>暂无可用变量</li>
              }
            </ul>
          </nz-dropdown-menu>

          <button nz-button nzType="dashed" nzSize="small" type="button" nz-dropdown [nzDropdownMenu]="juelMenu">
            <nz-icon nzType="function" nzTheme="outline" />
            插入 JUEL
          </button>
          <nz-dropdown-menu #juelMenu="nzDropdownMenu">
            <ul nz-menu>
              @for (s of snippets; track s.label) {
              <li nz-menu-item (click)="insertText(s.insert)">{{ s.label }}</li>
              }
            </ul>
          </nz-dropdown-menu>
        </div>
        <div #modalHost class="juel-expression-editor__cm"></div>
      </div>
    </ng-container>
  </nz-modal>
  } @else {
  <div class="juel-expression-editor__readonly-fallback">{{ displayReadonlyValue() }}</div>
  }
</div>
