# Kiwi Admin 前端构建与远程部署配置（ssh + deploy）
# 复制为 build.local.yaml 后按需修改，勿提交含密码的副本。
#
# 用法（在 deploy/ 目录）：
#   python deploy.py
#   python deploy.py conf/build.local.yaml
#
# ssh 块 hostname、user 为必填；deploy 块字段均可选（有默认值）。

ssh:
  hostname: 192.0.2.10
  user: deploy

  # 可选
  # host: kiwi-test
  # port: 22
  # auth: key
  # identity_file: ~/.ssh/id_ed25519
  # strict_host_key_checking: accept-new

  # auth: password 时使用（二选一，推荐 password_env）
  # password_env: KIWI_SSH_PASSWORD
  # password: "your-secret"

deploy:
  # 可选（以下为常用示例，省略时使用脚本默认值）
  # backup_before_upload: true
  # dist_dir: dist
  # remote_dir: /var/www/kiwi-admin
  # npm: npm
  # skip_build: false
  # build_script: ng
  # npm_script: build
  # build_configuration: production
  # base_href: /kiwi-admin/
  # sync_mode: archive   # archive（默认，tar.gz 单次上传）| sftp（逐文件 SFTP）
